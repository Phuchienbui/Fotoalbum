<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'">
    <title>Fotoalbum</title>
    <link rel="icon" type="image/x-icon" href="./svg/fav-icon.svg">
    <link rel="stylesheet" href="./resets.css">
    <link rel="stylesheet" href="./variables.css">
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer ></script>
</head>
<body>
    <a href="#mainID">Skip zum Hauptinhalt</a>
    <header>
        <div class="header__wrapper">
            <img src="./svg/logo.svg" alt="Icon Fotogram">
        </div>
        
    </header>
    
    <main id="mainID" tabindex="-1">
        <h1 id="mainTitle">Your personal photo album</h1>
        <section class="main__wrapper"  aria-label="Bildergalerie">
            <ul>
                <li><button></button></li>
                <li><button></button></li>
            </ul> 
        </section>
    </main>

    <dialog aria-labelledby="dialogTitle">
        <div class="dialog__wrapper-header">
            <h2 id="dialogTitle"></h2>
            <button type="button" aria-label="Fenster Schließen">
                <img src="./svg/closebtn.svg" alt="">
            </button>
        </div>
        <img src="./img/Property 1=alaska-810433_1280.jpg.png" alt="ein vereinster See mit Bergen im Hintergrund">
        <div class="dialog__wrapper-footer">
            <button type="button" aria-label="vorheriges Bild">
                <img src="./svg/btn-left.svg" alt="">
            </button>
            <p></p>
            <button type="button" aria-label="nächstes Bild">
                <img src="./svg/btn-right.svg" alt="">
            </button>
        </div>
        
    </dialog>
    
    <footer>
        <div class="footer__wrapper">
            <img src="./svg/DVA-logo.svg" alt="Das Loge der Developer Akademie">
            <p>&copy;2023 Developer Akademie GmbH</p>
        </div>
    </footer>
</body>
</html>
