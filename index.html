<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Entdecke meine Fotogalerie 'Beauty is in everyone'.">
    <title>Fotoalbum</title>
    <link rel="icon" type="image/x-icon" href="./svg/fav-icon.svg">
    <link rel="stylesheet" href="./resets.css">
    <link rel="stylesheet" href="./variables.css">
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>

<body onload="renderGallery()">
    <a class="skip-link" href="#mainID">Skip Link</a>
    <header>
        <div class="header__wrapper">
            <img src="./svg/logo.svg" alt="Icon Fotogram">
        </div>

    </header>

    <main id="mainID" tabindex="-1">
        <div class="main__wrapper">
            <h1 id="mainTitle">Beauty is&nbsp;in everything</h1>
            <section class="main__gallery-wrapper" aria-label="Bildergalerie">
                <ul Id="gallery">
                    
                </ul>
            </section>
        </div>
            
    </main>

    <dialog closedby="any" aria-labelledby="dialogTitle">
        <div class="dialog__wrapper">
            <div class="dialog__wrapper-header">
                <h2 id="dialogTitle" class="dialogTitle"></h2>
                <button onclick="dialogClose()" id="dialogCloseBtn" class="dialogBtns" type="button" aria-label="Fenster Schließen">
                    <img class="dialogimgs" src="./svg/closebtn.svg" alt="">
                </button>
            </div>
            <div class="dialog__main-pic">
                <img id="dialogimgs" src="" alt="">
            </div>

            <div class="dialog__wrapper-footer">
                <button onclick="swipeLeft()" id="dialogLeftBtn" class="dialog-FooterBtns" type="button" aria-label="vorheriges Bild">
                    <img src="./svg/btn-left.svg" alt="">
                </button>
                <p id="counter"></p>
                <button onclick="swipeRight()" id="dialogRightBtn" class="dialog-FooterBtns" type="button" aria-label="nächstes Bild">
                    <img src="./svg/btn-right.svg" alt="">
                </button>
            </div>
        </div>


    </dialog>

    <footer>
        <div class="footer__wrapper">
            <img src="./svg/DVA-logo.svg" alt="Das Loge der Developer Akademie">
            <p id="footer_fs">&copy;2023 Developer Akademie GmbH</p>
        </div>
    </footer>
</body>
</html>
